default_install_hook_types: [pre-commit, commit-msg]

repos:
-   repo: https://gitlab.com/vojko.pribudic.foss/pre-commit-update
    rev: v0.9.0
    hooks:
    -   id: pre-commit-update
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-json
    -   id: check-toml
    -   id: check-added-large-files
        args: [--maxkb=1000]
    -   id: debug-statements      # catches leftover pdb/ipdb/breakpoint()
    -   id: check-merge-conflict
-   repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
    -   id: gitleaks
-   repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.16
    hooks:
    # Run the linter for imports
    -   id: ruff-check
        args: [--select, I, --fix]
    # Automatically fix issues.
    -   id: ruff-check
        args: [--fix]
    # Run the formatter.
    -   id: ruff-format
-   repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
    -   id: markdownlint-cli2
    -   id: markdownlint-cli2
        alias: markdownlint-cli2-fix
        args: [--fix]
        stages: [manual]
-   repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
    -   id: gitlint
        stages: [commit-msg]
-   repo: local
    hooks:
    -   id: uv-lock-check
        name: uv.lock is in sync with pyproject.toml
        entry: uv lock --check
        language: system
        stages: [pre-commit]
        pass_filenames: false
        files: ^(pyproject\.toml|uv\.lock)$

    -   id: basedpyright
        name: basedpyright type check (recommended mode; workspace canonical)
        entry: uv run basedpyright src/pdomain_prep_for_pgdp --level error
        language: system
        stages: [pre-commit]
        pass_filenames: false
        files: ^src/pdomain_prep_for_pgdp/.*\.py$

    -   id: frontend-tsc
        name: frontend tsc -b --noEmit
        description: TypeScript project-references type-check for the React SPA.
        # mise-trust-worktrees trusts generated worktree roots so this can use
        # the project tool versions from mise.toml without per-worktree prompts.
        entry: bash -c 'cd frontend && if command -v mise >/dev/null 2>&1; then
          exec mise exec -- npx tsc -b --noEmit; else exec npx tsc -b --noEmit;
          fi'
        language: system
        files:
          ^frontend/(src/.*\.(ts|tsx)|tsconfig.*\.json|package(-lock)?\.json|vite\.config\.ts)$
        pass_filenames: false
    -   id: frontend-eslint
        name: frontend eslint
        description: ESLint flat-config check for the React SPA.
        entry: bash -c 'cd frontend && if command -v mise >/dev/null 2>&1; then
          exec mise exec -- npm run --silent lint; else exec npm run --silent
          lint; fi'
        language: system
        # Match what eslint actually lints: SPA source, the flat config
        # itself, and dependency manifests (a new dep can change rules
        # via plugins). Ignore patterns inside frontend/eslint.config.js
        # exclude `dist/`, `node_modules/`, and `src/api/types.gen.ts`.
        files:
          ^frontend/(src/.*\.(ts|tsx)|eslint\.config\.js|package(-lock)?\.json)$
        pass_filenames: false
    -   id: frontend-prettier
        name: frontend prettier --check
        description: Prettier format check for the React SPA.
        entry: bash -c 'cd frontend && if command -v mise >/dev/null 2>&1; then
          exec mise exec -- npm run --silent format:check; else exec npm run
          --silent format:check; fi'
        language: system
        # Prettier covers a broader file set than ESLint (CSS, JSON,
        # config files); keep the path filter wide enough to match.
        # The .prettierignore handles dist/, node_modules/, generated
        # types.gen.ts, and package-lock.json.
        files:
          ^frontend/(src/.*|\.prettierrc\.json|\.prettierignore|package(-lock)?\.json|tsconfig.*\.json|vite\.config\.ts|vitest\.config\.ts|tailwind\.config\.ts|postcss\.config\.js|eslint\.config\.js)$
        pass_filenames: false
