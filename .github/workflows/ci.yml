name: ci

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    env:
      # Pin Python 3.13 — uv would otherwise pick up the newest matching
      # `requires-python` (3.14), which segfaults on TestClient teardown
      # via anyio + sqlite3 worker threads. Drop this once anyio + SQLite
      # are 3.14-clean.
      UV_PYTHON: "3.13"
      # Prevent CUDA from initialising on CPU-only CI runners. pdomain-book-tools
      # depends on cupy-cuda12x; conftest._detect_gpu() imports cupy at
      # collection time, which triggers CUDA library init. Without a GPU the
      # CUDA driver teardown segfaults at process exit (exit code 139).
      # CUDA_VISIBLE_DEVICES="" suppresses GPU enumeration before cupy loads.
      CUDA_VISIBLE_DEVICES: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "24"
      - name: Enable pnpm via corepack
        run: corepack enable && corepack prepare pnpm@11.3.0 --activate
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.11.16"
      - run: make ci
