name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-frontend:
    name: build SPA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          # `cache: npm` requires a committed package-lock.json. We don't
          # have one yet (the lockfile is generated on first `npm install`).
          # Re-enable once the lockfile is committed.
      - name: npm install
        run: cd frontend && npm install
      - name: ESLint
        run: cd frontend && npm run lint
      - name: Prettier (format:check)
        run: cd frontend && npm run format:check
      - name: Vitest (SPA unit tests)
        run: cd frontend && npm test
      - name: Build
        run: cd frontend && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  test:
    name: pytest + ruff
    runs-on: ubuntu-latest
    needs: [build-frontend]
    env:
      # Pin Python 3.13 — uv would otherwise pick up the newest matching
      # `requires-python` (3.14), which segfaults on TestClient teardown
      # via anyio + sqlite3 worker threads. Drop this once anyio + SQLite
      # are 3.14-clean.
      UV_PYTHON: "3.13"
      # Prevent CUDA from initialising on CPU-only CI runners. pd-book-tools
      # depends on cupy-cuda12x; conftest._detect_gpu() imports cupy at
      # collection time, which triggers CUDA library init. Without a GPU the
      # CUDA driver teardown segfaults at process exit (exit code 139).
      # CUDA_VISIBLE_DEVICES="" suppresses GPU enumeration before cupy loads.
      CUDA_VISIBLE_DEVICES: ""
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - name: Sync deps
        run: uv sync --group dev
      - name: Lint
        run: uv run ruff check
      - name: Format check
        run: uv run ruff format --check
      # Roadmap §22: the SPA fallback tests in tests/test_spa_fallback.py
      # skip themselves when src/pd_prep_for_pgdp/static/index.html is missing.
      # Without this download they were silently skipping in CI. Pulling the
      # already-built bundle from the build-frontend job forces them to run.
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: src/pd_prep_for_pgdp/static/
      - name: Verify SPA bundle present (roadmap §22)
        run: test -f src/pd_prep_for_pgdp/static/index.html
      - name: Tests
        run: uv run pytest tests/ -v --ignore=tests/e2e
