name: release

# Triggers:
#  - push to main: lint + tests + build sanity-check (no publish).
#  - tag push (v*): same + build container + publish artefacts.
#
# This workflow follows spec 09 §"CI/CD". `install.sh` resolves the latest
# GitHub tag and runs `uv tool install` against it — there's no PyPI publish.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: pytest + ruff
    runs-on: ubuntu-latest
    env:
      # Pin Python 3.13 — uv would otherwise pick up the newest matching
      # `requires-python` (3.14), which segfaults on TestClient teardown
      # via anyio + sqlite3 worker threads. Drop this once anyio + SQLite
      # are 3.14-clean.
      UV_PYTHON: "3.13"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - name: Sync deps
        run: uv sync --group dev
      - name: Lint
        run: uv run ruff check
      - name: Format check
        run: uv run ruff format --check
      - name: Tests
        run: uv run pytest tests/ -v

  build-frontend:
    name: build SPA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          # `cache: npm` requires a committed package-lock.json. We don't
          # have one yet (the lockfile is generated on first `npm install`).
          # Re-enable once the lockfile is committed.
      - name: npm install
        run: cd frontend && npm install
      - name: Build
        run: cd frontend && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  build-wheel:
    name: build wheel
    runs-on: ubuntu-latest
    needs: [test, build-frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs full history for the version
      - uses: astral-sh/setup-uv@v4
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: src/pd_prep_for_pgdp/static/
      - name: Build
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/
          retention-days: 7

  build-container:
    name: build managed-mode container
    runs-on: ubuntu-latest
    needs: [test, build-frontend]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: src/pd_prep_for_pgdp/static/
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push — wire up your registry)
        run: |
          # Strip the leading "v" from refs like v0.1 -> 0.1.
          VERSION="${GITHUB_REF_NAME#v}"
          docker build \
            --build-arg "VERSION=${VERSION}" \
            -t "pgdp-prep:${GITHUB_REF_NAME}" .
          docker images pgdp-prep
