name: release

# Triggered by an annotated tag push (`v*`). The local pre-flight
# (`scripts/do-release.sh` → `make ci`) is the primary safety net;
# this workflow is the build + publish step.
#
# This workflow follows spec 09 §"CI/CD". build-wheel uploads the wheel as
# an asset on the GitHub Release for the pushed tag; install.sh downloads
# that asset directly (no git+ install, so end users don't need Node/npm).
# There is no PyPI publish.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build-frontend:
    name: build SPA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # hatch-vcs needs full history for the version
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
      - name: Enable pnpm via corepack
        run: corepack enable && corepack prepare pnpm@11.3.0 --activate
      - name: Install (frozen lockfile)
        run: cd frontend && pnpm install --frozen-lockfile
      - name: ESLint
        run: cd frontend && pnpm run lint
      - name: Prettier (format:check)
        run: cd frontend && pnpm run format:check
      - name: Vitest (SPA unit tests)
        run: cd frontend && pnpm test
      - name: Build
        run: cd frontend && pnpm run build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  build-wheel:
    name: build wheel
    runs-on: ubuntu-latest
    needs: [build-frontend]
    permissions:
      contents: write  # required to upload assets to the GitHub Release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # hatch-vcs needs full history for the version
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: frontend-dist
          path: src/pd_prep_for_pgdp/static/
      # `--wheel` skips the sdist step. Default `uv build` produces an sdist
      # *and* rebuilds the wheel from inside the unpacked sdist; that fails
      # because src/pd_prep_for_pgdp/static/ is .gitignore'd, so the sdist
      # omits the SPA, and the wheel-from-sdist build trips the SPA-bundle
      # guard in build_hooks/spa_check.py. The downloaded `frontend-dist`
      # artifact above places the SPA at src/pd_prep_for_pgdp/static/, and
      # `--wheel` consumes it directly.
      - name: Build
        run: uv build --wheel
      # Roadmap §22: assert the SPA bundle is actually inside the wheel.
      - name: Verify wheel contains SPA bundle (roadmap §22)
        run: |
          set -euo pipefail
          shopt -s nullglob
          wheels=(dist/*.whl)
          if [ ${#wheels[@]} -eq 0 ]; then
            echo "::error::no wheel produced under dist/"
            exit 1
          fi
          for whl in "${wheels[@]}"; do
            echo "checking $whl"
            if ! python -m zipfile -l "$whl" | grep -q 'pd_prep_for_pgdp/static/index\.html'; then
              echo "::error::$whl is missing pd_prep_for_pgdp/static/index.html — run 'make frontend-build' before building"
              python -m zipfile -l "$whl"
              exit 1
            fi
          done
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wheel
          path: dist/
          retention-days: 7
      - name: Publish wheel to GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*.whl
          fail_on_unmatched_files: true

  build-container:
    name: build managed-mode container
    runs-on: ubuntu-latest
    needs: [build-frontend]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: frontend-dist
          path: src/pd_prep_for_pgdp/static/
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Build image (no push — wire up your registry)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          docker build \
            --build-arg "VERSION=${VERSION}" \
            -t "pgdp-prep:${GITHUB_REF_NAME}" .
          docker images pgdp-prep
