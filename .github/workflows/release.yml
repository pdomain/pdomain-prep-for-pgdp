name: release

# Dispatch-only release. scripts/do-release.sh pushes the exact tag after
# local ci-slow passes, then triggers this workflow with the tag input below.
# Chore: review pinned action SHAs weekly. Update version comments and SHAs together.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release, for example v1.2.3"
        required: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  UV_PYTHON: "3.13"
  CUDA_VISIBLE_DEVICES: ""

jobs:
  publish:
    name: publish GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag }}
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.11.16"
      - name: Set up Python
        run: uv python install 3.13
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "24"
      - name: Enable pnpm via corepack
        run: corepack enable && corepack prepare pnpm@11.3.0 --activate
      - name: Build release artifacts
        run: make build

      - name: List built artifacts
        run: ls -la dist/

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/*.whl)
          if [ ${#files[@]} -ne 1 ]; then
            echo "::error::expected exactly one wheel under dist/"
            ls -la dist/
            exit 1
          fi
          gh release create "$RELEASE_TAG" "${files[@]}" \
            --generate-notes \
            --verify-tag

      - name: Notify pdomain-index of new release
        env:
          GH_TOKEN: ${{ secrets.PDOMAIN_INDEX_DISPATCH }}
          RELEASE_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::PDOMAIN_INDEX_DISPATCH is not set; index will catch up via daily cron"
            exit 0
          fi
          gh api -X POST /repos/pdomain/pdomain-index-pip/dispatches \
            -f event_type=pdomain-release-published \
            -F 'client_payload[repo]=pdomain-prep-for-pgdp' \
            -F "client_payload[tag]=$RELEASE_TAG" || \
            echo "::warning::pdomain-index-pip dispatch failed; index will catch up via daily cron"
